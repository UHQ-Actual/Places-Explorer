name: Deploy Places crosswalk explorer

on:
  workflow_dispatch:
  repository_dispatch:
    types: [crosswalk-updated]

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out private source repository
        uses: actions/checkout@v7
        with:
          repository: UHQ-Actual/Places
          ref: main
          token: ${{ secrets.PLACES_SOURCE_TOKEN }}
          path: source
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install workbook reader
        run: python -m pip install openpyxl==3.1.5

      - name: Build static explorer
        run: python source/scripts/build_crosswalk_explorer.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: source/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
